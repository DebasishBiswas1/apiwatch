services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: monitor_user
      POSTGRES_PASSWORD: monitor_pass_2024
      POSTGRES_DB: monitoring
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor_user -d monitoring"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
